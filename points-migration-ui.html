<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>护卫军积分-改版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .app-container {
            max-width: 414px;
            margin: 0 auto;
            background-color: #fff;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 水印效果 */
        .watermark-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 999;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><text x='20' y='100' transform='rotate(-30 100 100)' fill='rgba(0,0,0,0.03)' font-size='14' font-family='sans-serif'>1763458757134495745</text></svg>");
        }

        /* 顶部导航 Tabs */
        .tabs-wrapper {
            display: flex;
            padding: 15px 0 0 15px;
            overflow-x: auto;
            border-bottom: 1px solid #f0f0f0;
        }

        .tabs-wrapper::-webkit-scrollbar {
            display: none;
        }

        .tab-item {
            font-size: 15px;
            color: #666;
            padding-bottom: 12px;
            margin-right: 25px;
            white-space: nowrap;
            position: relative;
        }

        .tab-item.active {
            color: #333;
            font-weight: bold;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #cc0000;
            border-radius: 2px;
        }

        /* 积分卡片区域 */
        .card-wrapper {
            padding: 15px;
        }

        .points-card {
            background: linear-gradient(135deg, #fff7ed 0%, #ffead6 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 150, 50, 0.1);
        }

        /* 右下角装饰圆晕 */
        .card-bg-decoration {
            position: absolute;
            bottom: -40px;
            right: -30px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(255, 204, 153, 0.6) 0%, rgba(255, 204, 153, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .card-inner {
            padding: 20px 20px 15px 20px;
            position: relative;
            z-index: 2;
        }

        /* 积分说明小按钮 */
        .rule-btn {
            position: absolute;
            top: 15px;
            right: 0;
            background: rgba(210, 150, 120, 0.7);
            color: #fff;
            font-size: 12px;
            padding: 4px 8px 4px 12px;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .main-title {
            font-size: 13px;
            color: #886655;
            margin-bottom: 5px;
        }

        .main-score {
            font-size: 40px;
            font-weight: bold;
            color: #222;
            line-height: 1.1;
        }

        .sync-rule-tip {
            font-size: 11px;
            color: #cc5500;
            background: rgba(255, 170, 100, 0.15);
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 8px;
        }

        /* 核心改造：嵌入式对账单 */
        .bill-detail-box {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid rgba(255, 170, 100, 0.3);
            border-radius: 8px;
            padding: 10px 12px;
            backdrop-filter: blur(4px);
        }

        .bill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            color: #cc5500;
        }

        .bill-formula {
            font-size: 11px;
            color: #a67c66;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 170, 100, 0.2);
        }

        /* 底部跳转条 */
        .jump-bar {
            background: linear-gradient(90deg, #ffa066 0%, #ff7733 100%);
            padding: 12px 15px;
            color: #fff;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .jump-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 引导提示语 */
        .flow-tip {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            padding: 0 5px;
            line-height: 1.5;
        }

        /* 积分动态列表 */
        .list-container {
            padding: 15px;
        }

        .list-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f2f2f2;
        }

        .item-left .item-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
        }

        .item-left .item-time {
            font-size: 12px;
            color: #aaa;
        }

        .item-right {
            font-size: 16px;
            color: #333;
        }

        /* 模拟悬浮机器人 */
        .floating-bot {
            position: fixed;
            bottom: 80px;
            right: 15px;
            width: 50px;
            height: 50px;
            background: linear-gradient(180deg, #7b88ff, #5c6cf2);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(92, 108, 242, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            z-index: 1000;
        }

        .floating-bot::before {
            content: '● ●';
            font-size: 14px;
            line-height: 1;
            margin-bottom: 2px;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- 水印层 -->
        <div class="watermark-layer"></div>

        <!-- 顶部导航 -->
        <div class="tabs-wrapper">
            <div class="tab-item active">护卫军积分</div>
            <div class="tab-item">东风日产积分</div>
            <div class="tab-item">东风本田积分</div>
        </div>

        <!-- 积分卡片区 -->
        <div class="card-wrapper">
            <div class="points-card">
                <!-- 装饰背景图案 -->
                <div class="card-bg-decoration"></div>

                <div class="card-inner">
                    <div class="rule-btn">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 16v-4"></path>
                            <path d="M12 8h.01"></path>
                        </svg>
                        积分说明
                    </div>

                    <div class="main-title">总积分</div>
                    <div class="main-score">27220</div>
                    <div class="sync-rule-tip">
                        💡 新增积分将累加至此处，并按 10:1 自动同步至福利商城
                    </div>

                    <!-- 嵌入式对账单 -->
                    <div class="bill-detail-box">
                        <div class="bill-row">
                            <span>累计同步友福利商城积分</span>
                            <span style="font-size: 16px;">2700</span>
                        </div>
                        <div class="bill-formula">
                            历史账目核对：(27220 - 历史已消耗 220) ÷ 10
                        </div>
                    </div>
                </div>

                <!-- 底部无缝拼接的橙色动作条 -->
                <div class="jump-bar">
                    <span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 16 16 12 12 8"></polyline>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                        跳转友福利商城查看实际可兑换和已消耗积分
                    </span>
                    <span>&gt;</span>
                </div>
            </div>

            <!-- （提示语已移至上方对账单内，保持信息内聚） -->
        </div>

        <!-- 列表区 -->
        <div class="list-container">
            <div class="list-title">积分动态</div>

            <div class="list-item">
                <div class="item-left">
                    <div class="item-name">东风护卫军-充值-获得</div>
                    <div class="item-time">2026-05-28 10:02:57</div>
                </div>
                <div class="item-right">+10</div>
            </div>

            <div class="list-item">
                <div class="item-left">
                    <div class="item-name">东风护卫军-充值-获得</div>
                    <div class="item-time">2026-05-27 20:39:57</div>
                </div>
                <div class="item-right">+10</div>
            </div>

            <div class="list-item">
                <div class="item-left">
                    <div class="item-name">东风护卫军-作业-获得</div>
                    <div class="item-time">2026-05-27 20:23:14</div>
                </div>
                <div class="item-right">+13</div>
            </div>

            <div class="list-item">
                <div class="item-left">
                    <div class="item-name">东风护卫军-作业-获得</div>
                    <div class="item-time">2026-05-27 19:54:46</div>
                </div>
                <div class="item-right">+10</div>
            </div>
        </div>

        <!-- 悬浮小助手 -->
        <div class="floating-bot">Ai助手</div>
    </div>

</body>

</html>
